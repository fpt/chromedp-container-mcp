services:
  chromedp-mcp:
    build:
      context: .
      # corporate proxy CA, injected as a build secret. Run
      # `make certs.pem` first (copies ~/.corp-ca/certs.pem, or an empty
      # file when absent — the Dockerfile then skips the cert install).
      secrets:
        - ca_cert
    image: chromedp-container-mcp:latest
    ports:
      - "8080:8080"
    environment:
      # Default transport is stdio; this service runs the SSE HTTP endpoint.
      MCP_TRANSPORT: sse
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8080"
      # URL advertised to SSE clients; set to the externally reachable address
      # when running behind a reverse proxy.
      MCP_BASE_URL: http://localhost:8080
      CHROME_MAXIMUM_INSTANCE: "5"
      CHROME_TTL: "15"
      CHROME_EXE_TIMEOUT: "300"
      # Corporate-proxy options — opt-in, off by default so a normal
      # `docker compose up` works on any network. Enable them in your shell, e.g.
      #   CHROME_IGNORE_CERT_ERRORS=true CHROME_PROXY_SERVER=http://proxy:3128 docker compose up
      #
      # CHROME_IGNORE_CERT_ERRORS: behind a TLS-intercepting proxy, Chrome cannot
      # verify the substituted certificate and fails navigation with
      # ERR_CERT_AUTHORITY_INVALID; "true" tells it to proceed past cert errors.
      CHROME_IGNORE_CERT_ERRORS: "${CHROME_IGNORE_CERT_ERRORS:-false}"
      # CHROME_PROXY_SERVER: when the container can only reach the internet via a
      # corporate proxy (Chrome ignores http_proxy/HTTPS_PROXY and needs the
      # --proxy-server flag). Empty = direct egress.
      CHROME_PROXY_SERVER: "${CHROME_PROXY_SERVER:-}"
    # Reap zombie Chrome child processes (PID 1 problem).
    init: true
    # Chrome can crash with BUS_ADRERR on the default 64MB /dev/shm. The server
    # passes --disable-dev-shm-usage by default, but a larger shm is still safer
    # for heavy pages / screenshots.
    shm_size: "1gb"
    restart: unless-stopped

secrets:
  ca_cert:
    file: ./certs.pem
